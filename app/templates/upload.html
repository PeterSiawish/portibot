{% extends "base.html" %} {% block title %}Upload CV{% endblock %} {% block head
%}
<link
  rel="stylesheet"
  href="{{url_for('static', filename='css/upload.css')}}"
/>
{% endblock %} {% block body %}
<h1>Upload Your CV</h1>
<p>Please upload your CV to receive feedback and improve your employability.</p>
<form
  action="{{url_for('upload.upload_page')}}"
  method="post"
  enctype="multipart/form-data"
>
  <input type="file" name="cv" accept=".pdf,.doc,.docx" required />
  <input type="submit" value="Upload" />
</form>
{% endblock %}
